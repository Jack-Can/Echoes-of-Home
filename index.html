<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回声驿站 - 情感翻译机</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/utilities.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>

  <!-- ========== 左侧栏 ========== -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">📻 回声驿站</div>
      <div class="logo-sub">EMOTIONAL TRANSLATOR</div>
    </div>

    <div class="identity-switcher">
      <button class="identity-btn active" id="btn-child" onclick="switchIdentity('child')">
        👨‍💻 孩子端
      </button>
      <button class="identity-btn" id="btn-parent" onclick="switchIdentity('parent')">
        👴 父母端
      </button>
    </div>

    <div class="weather-card">
      <div class="weather-emoji">🌤️</div>
      <div class="weather-status">当前关系：晴朗</div>
      <div class="weather-detail">已联系：刚刚</div>
    </div>

    <div class="tip-box">
      <div class="tip-label">💡 今日锦囊</div>
      <div class="tip-text">天气不错，发一张今天的午饭照片吧。</div>
    </div>

    <div class="nav-sidebar">
      <button class="nav-sidebar-item active" id="navChat" onclick="switchView('chat')">
        <span class="nav-icon">💬</span>
        <span class="nav-text">聊天</span>
      </button>
      <button class="nav-sidebar-item" id="navCalendar" onclick="switchView('calendar')">
        <span class="nav-icon">📅</span>
        <span class="nav-text">日历</span>
      </button>
    </div>
  </aside>

  <!-- ========== 右侧主内容区 ========== -->
  <main class="main-area">
    <header class="header" id="mainHeader">
      <div class="header-title" id="headerTitle">
        正在与 <strong>老妈</strong> <span class="header-dot">沟通中...</span>
      </div>
    </header>

    <div class="content-wrapper" id="chatWrapper">
      <div class="chat-stream" id="chatStream">
        <!-- 消息由 JS 渲染 -->
      </div>

      <footer class="footer">
        <!-- 孩子端输入 -->
        <div class="input-mode-chat" id="inputChat">
          <button class="attach-btn" title="添加附件">📎</button>
          <input type="text" class="text-input" id="msgInput" placeholder="输入消息... (回车发送)" autocomplete="off">
          <button class="letter-btn" id="letterBtn" onclick="openLetterMode()" title="写信">
            📜 写信
          </button>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">➤</button>
        </div>

        <!-- 父母端输入切换器 -->
        <div class="input-mode-voice" id="inputVoice">
          <div class="parent-mode-tabs" id="parentModeTabs">
            <button class="parent-mode-tab active" id="tabVoice" onclick="switchParentInput('voice')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
              语音
            </button>
            <button class="parent-mode-tab" id="tabText" onclick="switchParentInput('text')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/>
              </svg>
              打字
            </button>
          </div>
          <div class="parent-voice-area" id="parentVoiceArea">
            <button class="voice-btn" id="voiceRecordBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="mic-icon">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
              <span class="btn-label">按住录音</span>
              <span class="btn-recording-indicator">
                <span class="voice-recording-dot"></span>
                录音中
              </span>
            </button>
          </div>
          <div class="parent-text-area hidden" id="parentTextArea">
            <button class="attach-btn" title="添加附件">📎</button>
            <input type="text" class="text-input" id="parentMsgInput" placeholder="输入消息... (回车发送)" autocomplete="off">
            <button class="send-btn" onclick="sendMessageParent()">➤</button>
          </div>
        </div>
      </footer>
    </div>

    <!-- ========== 日历模块容器 ========== -->
    <div class="calendar-wrapper" id="calWrapper" style="display:none;">
      <div id="cal-container" class="cal-container">
        <!-- 日历模块由 JS 动态渲染 -->
      </div>
    </div>

  </main>

  <!-- ========== 图片放大弹窗 ========== -->
  <div class="image-lightbox hidden" id="imageLightbox">
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <button class="lightbox-close" id="lightboxClose">×</button>
    <button class="lightbox-prev hidden" id="lightboxPrev">&#8249;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button class="lightbox-next hidden" id="lightboxNext">&#8250;</button>
    <div class="lightbox-counter hidden" id="lightboxCounter"></div>
  </div>

  <!-- Mock 数据 -->
  <script src="js/data.js"></script>
  <script src="js/calendar-data.js"></script>
  <script src="js/emotion-intelligence.js"></script>
  <script src="js/app.js"></script>
  <script src="js/calendar-view.js"></script>
  <script src="js/calendar-timeline.js"></script>
  <script src="js/calendar-warmth.js"></script>
  <script src="js/calendar-weather.js"></script>
  <script src="js/calendar-memo.js"></script>
  <script src="js/calendar-report.js"></script>
  <script src="js/calendar.js"></script>

</body>
</html>
